bundle:
  name: source

targets:
  dev:
    workspace:
      host: https://<dev-workspace>
    resources:
      jobs:
        run_populate:
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"
            timezone_id: UTC
            pause_status: PAUSED                    # PAUSED in dev

  prod:
    workspace:
      host: https://<prod-workspace>
    resources:
      jobs:
        run_populate:
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"  # Daily at 6am
            timezone_id: UTC
            pause_status: UNPAUSED                 # UNPAUSED in prod to enable scheduled runs