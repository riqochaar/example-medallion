bundle:
  name: source

targets:
  dev:
    workspace:
      host: https://<dev-workspace>
    resources:
      jobs:
        run_populate:
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"  # daily at 6am
            timezone_id: UTC
            pause_status: PAUSED

  prod:
    workspace:
      host: https://<prod-workspace>
    resources:
      jobs:
        run_populate:
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"  # daily at 6am
            timezone_id: UTC
            pause_status: UNPAUSED